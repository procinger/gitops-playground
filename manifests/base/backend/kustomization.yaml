apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml

replacements:
  - source:
      kind: Deployment
      name: backend
      fieldPath: spec.template.spec.containers.[name=backend].image
      options:
        delimiter: ":"
        index: 1
    targets:
      - select:
          kind: Deployment
          name: backend
        fieldPaths:
          - metadata.labels.version
          - spec.template.metadata.labels.version
