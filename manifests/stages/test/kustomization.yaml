apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patches/virtualservice.yaml
    target:
      kind: VirtualService
      name: virtualservice

  - path: patches/isolation.yaml
    target:
      kind: AuthorizationPolicy
      name: isolation

configMapGenerator:
  - name: backend-config
    literals:
      - BACKEND_URL=http://backend
